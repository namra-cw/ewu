services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ewu-media
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles:
      - tools

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports:
      - '5540:5540'
    volumes:
      - redisinsight:/data
    depends_on:
      - redis
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
  redisinsight:
