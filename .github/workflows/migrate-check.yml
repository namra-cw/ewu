name: migrate-check

on:
  pull_request:
    branches: [main, staging]
    paths:
      - libs/database/prisma/**

permissions:
  contents: read

concurrency:
  group: migrate-check-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Migration Drift Check
    runs-on: ubuntu-latest

    services:
      shadow-db:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: shadow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prisma"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Check migration drift
        env:
          SHADOW_DATABASE_URL: postgresql://prisma:prisma@localhost:5432/shadow
        run: |
          pnpm exec prisma migrate diff \
            --from-migrations ./libs/database/prisma/migrations \
            --to-schema ./libs/database/prisma/schema.prisma \
            --exit-code
